# SAI Bubblewrap Profile (reference configuration)

# Base isolation flags are enforced by sandbox_exec.sh
# This file acts as a policy template / documentation layer

# === Filesystem Isolation ===
ro_bind=/app
tmpfs=/tmp
tmpfs=/var/tmp

# === Device restrictions ===
no_dev=true

# === Process isolation ===
unshare_all=true
die_with_parent=true

# === Network ===
network=none

# === Security posture ===
seccomp=default
